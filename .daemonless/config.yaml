type: base
build:
  auto_version: true
  architectures:
    - amd64
  variants:
    - tag: "15-pkg"
      args:
        PKG_BRANCH: quarterly
      aliases: ["latest"]
    - tag: "15-pkg-latest"
      args:
        PKG_BRANCH: latest
    - tag: "15.1-beta3-pkg"
      args:
        FREEBSD_RELEASE: "15.1.beta3"
        PKG_BRANCH: quarterly

cit:
  mode: shell
